<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syajagad Tercinta </title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>SyaJagad</span>
            </div>
            <ul class="nav-menu">
                <li><a href="#home" class="nav-link">Home</a></li>
                <li><a href="#about" class="nav-link">About</a></li>
                <li><a href="#portfolio" class="nav-link">Portfolio</a></li>
                <li><a href="#contact" class="nav-link">Contact</a></li>
            </ul>
            <button class="nav-signin">Sign In</button>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-bg"></div>
        <div class="hero-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        
        <div class="hero-container">
            <div class="hero-content">
                <h1 class="hero-title">
                    SMART PAYMENT<br>
                    <span class="gradient-text">SYSTEM</span>
                </h1>
                <p class="hero-subtitle">
                    Experience the future of seamless, secure, and lightning-fast digital payments. 
                    Transform your transactions with cutting-edge fintech innovation.
                </p>
                <div class="hero-buttons">
                    <button class="cta-button primary">Get Started</button>
                    <button class="cta-button secondary">Watch Demo</button>
                </div>
            </div>
            
            <div class="hero-illustration">
                <div class="illustration-container">
                    <div class="phone">
                        <div class="phone-screen">
                            <div class="transaction-animation">
                                <div class="coin-stack"></div>
                                <div class="card"></div>
                                <div class="check-mark"></div>
                            </div>
                        </div>
                    </div>
                    <div class="floating-coins">
                        <div class="coin coin-1"></div>
                        <div class="coin coin-2"></div>
                        <div class="coin coin-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
